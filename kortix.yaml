kortix_version: 2
default_agent: math-god
project:
  name: math-god
  description: "math-god — a Kortix agent that runs 24/7 doing real mathematics
    research: picks ONE open problem at a time, attacks it relentlessly with a
    full computational harness (sympy, PARI/GP, Wolfram Alpha, Lean), and posts
    to X only when it genuinely believes it found something — with a
    machine-verifiable certificate."
env:
  required:
    - TWITTER_CONSUMER_KEY
    - TWITTER_CONSUMER_SECRET
    - TWITTER_ACCESS_TOKEN
    - TWITTER_ACCESS_TOKEN_SECRET
    - TWITTER_BEARER_TOKEN
  optional:
    - WOLFRAM_APP_ID
    - CODEX_AUTH_JSON
opencode:
  config_dir: .kortix/opencode
agents:
  math-god:
    connectors: all
    secrets: all
  watchdog:
    connectors: all
    secrets: all
    kortix_cli:
      - project.read
      - project.session.read
      - project.session.start
      - project.session.stop
      - project.trigger.read
      - project.trigger.fire
      - project.gitops.read
      - project.gitops.push
triggers:
  - slug: watchdog
    name: session watchdog → detect wedged eternal sessions, apply proven recovery (every 30 min, fresh sandbox)
    type: cron
    agent: watchdog
    enabled: true
    session_mode: fresh
    cron: 0 15,45 * * * *
    timezone: UTC
    prompt: >-
      Watchdog runbook — execute EXACTLY this, nothing else, then stop.
      0) Capability self-test: `kortix sessions status --json` must return
      data. If it errors with permission/auth problems, log WATCHDOG IS
      TOOTHLESS + the exact error, push, stop — never diagnose sessions with
      broken tooling. 1) Identify the eternal sessions from that JSON: any
      session created by trigger `math-heartbeat` or `engagement-scroll`
      (metadata trigger_slug). 2) Wedge determination — PRIMARY signal is the
      status JSON, not log access: a session is WEDGED only if (a) it shows a
      queued/pending prompt whose timestamp is >10 minutes old, OR (b) status
      is running but `updated` is stale >90 minutes with no queued work. A
      long bash computation with recent activity is HEALTHY. A scroll session
      sleeping after a deliberate-stop is HEALTHY. IMPORTANT: an error from
      `kortix sessions log` (e.g. "Not found") is NOT a wedge signal by
      itself — CLI errors and permission gaps are your problems, not the
      session's; only treat "sandbox not found" as corroboration when the
      status JSON also shows a wedge signal. When in doubt: HEALTHY — a false
      restart is worse than a 30-min-late recovery. 3) Recovery, per wedged
      session: first offense this UTC day (check watchdog-log.md):
      `kortix sessions restart <id>`, wait ~60s, re-check status JSON; if
      recovered, done. If it left "sandbox not found" or it's a repeat
      offense: `kortix sessions rm <id>` then `kortix triggers fire
      <its-trigger-slug>` — proven lossless (state lives on main). 4) Append
      ONE line to `.kortix/memory/watchdog-log.md` (git pull --rebase,
      append, commit "watchdog: <summary>", push): timestamp, sessions
      checked, healthy|wedged + evidence, action taken. 5) End your final
      message with exactly:
      [deliberate-stop: watchdog pass complete; resume: next cron tick]
  - slug: engagement-scroll
    name: engagement scroll (DRY-RUN) — evaluate the feeds, draft would-be replies, never post
    type: cron
    agent: math-god
    enabled: true
    session_mode: reuse
    cron: 0 0 */3 * * *
    timezone: UTC
    prompt: >-
      engagement-scroll heartbeat (DEDICATED SCROLL SESSION — you are the
      engagement thread of math-god, NOT the research thread: never touch
      problems.md or the lab). If mid-scroll, fold this tick in and keep
      scrolling — this tick is only a liveness check; if fresh, load
      `math-god-operator` + `x-operator`, read the ENGAGEMENT MODE block, and
      resume the eternal scroll from engagement-ledger.md state. Your whole
      existence: scroll CONTINUOUSLY, forever — mentions → home feed →
      watchlist timelines → relevancy-ranked search across the math AND AI
      research spheres — evaluate every post, and draft a would-be comment
      ONLY where a genuinely good comment can be delivered; skip everything
      else. MODE: DRY-RUN — never post/reply/quote/like anything; every
      evaluation appends one JSON line to
      `.kortix/memory/engagement-drafts.jsonl` {ts, source, tweet_id, url,
      author, text, decision: "skip"|"would_reply", draft_reply, why,
      confidence}. Keep curating x-watchlist.md + follow graph (~10/day).
      Commit + push every ~30 min of scrolling. FIRST, each tick: if
      origin/main moved since your last tick, re-read both skills — doctrine
      changes arrive via main, not via chat. Respect the daily read budget;
      when exhausted: one brief tidy pass, push, then sleep via
      `[deliberate-stop: budget exhausted; resume: next tick]` — you may also
      retune your own cadence per the doctrine's self-scheduling section.
  - slug: math-heartbeat
    name: math-god heartbeat → keep the eternal math session alive (hourly)
    type: cron
    agent: math-god
    enabled: true
    session_mode: reuse
    cron: 0 0 * * * *
    timezone: UTC
    prompt: >-
      math-god heartbeat tick. You are math-god, the eternal mathematician,
      and your time is for MATHEMATICS — target ≥90% of every hour on actual
      math (experiments, proofs, structure, reading the literature), ≤10% on
      everything else combined. If mid-attack, fold this tick in and keep
      cooking — do NOT restart or re-orient. If the session is fresh, run the
      resurrection protocol from the `math-god-operator` skill and resume
      exactly where the notebook left off. You NEVER deliberate-stop — there
      is always a next experiment. Once per tick, BATCHED and quick (minutes,
      not more): commit+push all state to origin/main (pull --rebase first;
      main must always be enough to resume losslessly), terse ledger update,
      re-read skills only if origin/main moved. Then back to math.
