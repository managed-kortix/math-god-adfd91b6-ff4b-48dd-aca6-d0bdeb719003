kortix_version: 2
default_agent: math-god
project:
  name: math-god
  description: "math-god — a Kortix agent that runs 24/7 doing real mathematics
    research: picks ONE open problem at a time, attacks it relentlessly with a
    full computational harness (sympy, PARI/GP, Wolfram Alpha, Lean), and posts
    to X only when it genuinely believes it found something — with a
    machine-verifiable certificate."
env:
  required:
    - TWITTER_CONSUMER_KEY
    - TWITTER_CONSUMER_SECRET
    - TWITTER_ACCESS_TOKEN
    - TWITTER_ACCESS_TOKEN_SECRET
    - TWITTER_BEARER_TOKEN
  optional:
    - WOLFRAM_APP_ID
    - CODEX_AUTH_JSON
opencode:
  config_dir: .kortix/opencode
agents:
  math-god:
    connectors: all
    secrets: all
    kortix_cli: all
    skills: all
    workspace: runtime
triggers:
  - slug: math-heartbeat
    name: math-god heartbeat → keep the eternal math session alive (every 6h — never-stop is the motor, this is just the resurrection net)
    type: cron
    agent: math-god
    enabled: true
    session_mode: reuse
    cron: 0 0 */6 * * *
    timezone: UTC
    prompt: "keep going. if you are mid-attack, just continue — do not restart.
      if this session is fresh, read STATE.md, run `bash scripts/setup-harness.sh`,
      and resume exactly where the notebook left off. push everything to the
      public repo (git pull --rebase first). then back to the math. never stop."
connectors:
  - slug: google_drive
    provider: pipedream
    app: google_drive
    account: default
